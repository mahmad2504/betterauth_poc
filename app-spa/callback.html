<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPA callback</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main>
      <span class="eyebrow">SPA Application</span>
      <h1>Completing sign-in…</h1>
      <p>Exchanging the authorization code with PKCE in the browser.</p>
      <p class="error" id="error" hidden></p>
      <div class="actions">
        <a class="secondary" href="/">Back home</a>
      </div>
    </main>
    <script src="/js/config.js"></script>
    <script type="module">
      import { completeLoginFromCallback } from "/js/auth.js";

      const errorEl = document.getElementById("error");

      try {
        await completeLoginFromCallback();
        location.replace("/dashboard.html");
      } catch (error) {
        errorEl.hidden = false;
        errorEl.textContent =
          error instanceof Error ? error.message : String(error);
      }
    </script>
  </body>
</html>
