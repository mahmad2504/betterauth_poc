<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Admin · Better Auth</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="card card-wide">
      <span class="eyebrow">ADMIN · PORT 3000</span>
      <h1>Create user</h1>
      <p data-admin-status>Checking session…</p>

      <div data-admin-gate hidden>
        <p class="message error">Sign in with an admin account to manage users.</p>
        <div class="actions">
          <a class="button" data-admin-sign-in href="/sign-in?callbackURL=/admin">Sign in</a>
        </div>
      </div>

      <div data-admin-panel hidden>
        <p data-admin-who class="switch" style="margin-top:0;text-align:left"></p>
        <form data-admin-create>
          <label>Name<input name="name" autocomplete="name" required></label>
          <label>Email<input name="email" type="email" autocomplete="email" required></label>
          <p data-message class="message" hidden></p>
          <button type="submit">Create account &amp; send setup email</button>
        </form>
        <p class="switch">
          <a href="/">Home</a>
          ·
          <button type="button" class="linkish" data-admin-sign-out>Sign out</button>
        </p>
      </div>
    </main>
    <script src="/admin-ui.js"></script>
  </body>
</html>
