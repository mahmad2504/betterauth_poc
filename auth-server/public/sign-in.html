<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Sign in · Better Auth</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">BETTER AUTH · PORT 3000</span>
      <h1>Sign in once</h1>
      <p>Your central session will then sign you into both demo applications.</p>
      <form data-auth-form="signin">
        <label>Email<input name="email" type="email" autocomplete="email" required></label>
        <label>Password<input name="password" type="password" autocomplete="current-password" minlength="8" required></label>
        <p data-message class="message" hidden></p>
        <button type="submit">Sign in and continue</button>
      </form>
      <div data-google-sign-in hidden>
        <div class="divider" role="separator"><span>or</span></div>
        <button type="button" class="social" data-social="google">Continue with Google</button>
      </div>
      <p class="switch">No account? <a data-preserve-query href="/sign-up">Create one</a></p>
    </main>
    <script src="/auth-ui.js"></script>
  </body>
</html>
