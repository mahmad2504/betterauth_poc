<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Set password · Better Auth</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="card">
      <span class="eyebrow">BETTER AUTH · PORT 3000</span>
      <h1>Set your password</h1>
      <p>Create your password to activate your account.</p>
      <form data-auth-form="set-password">
        <label>Password<input name="password" type="password" autocomplete="new-password" minlength="8" required></label>
        <label>Confirm password<input name="confirmPassword" type="password" autocomplete="new-password" minlength="8" required></label>
        <p data-message class="message" hidden></p>
        <button type="submit">Save password</button>
      </form>
      <p class="switch"><a data-preserve-query href="/sign-in">Back to sign in</a></p>
    </main>
    <script src="/auth-ui.js"></script>
  </body>
</html>
